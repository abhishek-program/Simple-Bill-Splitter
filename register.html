<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Expense Splitter</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="navbar">
        <h1>💰 Bill  Splitter - Register</h1>
    </header>

    <main class="container">
        
        <!-- Registration Section -->
        <section class="register-section">
            <h2>Create an Account</h2>
            <form id="registerForm">
                <input type="text" id="newUsername" placeholder="Enter Username" required>
                <input type="password" id="newPassword" placeholder="Enter Password" required>
                <button type="submit" class="btn-primary">Register</button>
            </form>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </section>
    </main>

    <script type="module" src="js/register.js"></script>
</body>

</html>
